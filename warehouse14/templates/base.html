<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Складской учёт товаров</h1>
            <div class="nav">
                <a href="{{ url_for('index') }}">Все товары</a>
                <br>
                <a href="{{ url_for('low_stock') }}">Малые остатки</a>
                <br>
                <a href="{{ url_for('add_product_route') }}">Добавить товар +</a>
            </div>
        </div>
        
        <div class="content">
            {% block content %}{% endblock %}
            <br>
            <div class="flash-messages">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>
        </div>
    </div>
</body>
</html>
