{% extends "base.html" %}

{% block content %}

<h2>{% if product %}Редактирование товара{% else %}Добавление товара{% endif %}</h2>

<form method="POST">
    <div>
        <label>Название товара</label>
        <input type="text" name="name" value="{{ product.name if product else '' }}" required>
    </div>
    
    <div>
        <label>Категория</label>
        <input type="text" name="category" value="{{ product.category if product else '' }}" list="categories" required>
        <datalist id="categories">
            {% for cat in categories %}
                <option value="{{ cat }}">
            {% endfor %}
        </datalist>
        <small>Выберите существующую или добавьте новую</small>
    </div>
    
    <div>
        <label>Количество</label>
        <input type="number" name="quantity" value="{{ product.quantity if product else '' }}" min="0" required>
    </div>
    
    <div>
        <label>Цена</label>
        <input type="number" name="price" step="0.01" value="{{ product.price if product else '' }}" min="0" required>
    </div>
    
    <div>
        <label>Поставщик</label>
        <input type="text" name="supplier" value="{{ product.supplier if product else '' }}" required>
    </div>

    <br>
    
    <div>
        <button type="submit">{% if product %}Сохранить{% else %}Добавить{% endif %}</button>
        <a href="{{ url_for('index') }}">Отмена</a>
    </div>
</form>
{% endblock %}
